<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濮阳7日天气预报</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/weather.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark nav-dark">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🌤️ 返回首页</a>
    </div>
</nav>
<div class="container py-4">
    <h3 class="text-center text-white mb-4">濮阳7天天气预报</h3>
    <div class="row g-3" id="weekBox">
        <div class="col-12 text-center text-white">加载中...</div>
    </div>
</div>
<footer class="text-center text-white py-3 mt-5">
    <small>7天长期预报 | Open-Meteo免费气象数据</small>
</footer>
<script>
const lat = 35.7762;
const lon = 115.0186;

// 天气编码转图标
function getWeatherIcon(code) {
    const map = {
        0: "☀️", 1: "⛅", 2: "⛅", 3: "☁️",
        45: "🌫️", 51: "🌧️", 61: "🌨️", 80: "🌦️", 95: "⛈️"
    }
    return map[code] || "🌤️";
}

async function loadWeek() {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia/Shanghai`;
    try {
        const res = await fetch(url);
        const d = await res.json();
        const daily = d.daily;
        const wrap = document.getElementById("weekBox");
        wrap.innerHTML = "";

        for (let i = 0; i < daily.time.length; i++) {
            const date = daily.time[i];
            const icon = getWeatherIcon(daily.weather_code[i]);
            const maxTemp = daily.temperature_2m_max[i];
            const minTemp = daily.temperature_2m_min[i];
            wrap.innerHTML += `
            <div class="col-md-3 col-6">
                <div class="card p-3 text-center">
                    <h5>${date}</h5>
                    <div style="font-size:2.5rem;margin:10px 0;">${icon}</div>
                    <p class="mb-0">最高${maxTemp}℃</p>
                    <p class="mb-0">最低${minTemp}℃</p>
                </div>
            </div>`;
        }
    } catch (err) {
        document.getElementById("weekBox").innerHTML = `<div class="col-12 text-center text-white">数据加载失败</div>`;
        console.error(err);
    }
}
window.onload = loadWeek;
</script>
</body>
</html>
