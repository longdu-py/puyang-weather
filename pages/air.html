<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濮阳空气质量AQI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/weather.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark nav-dark">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🌤️ 返回首页</a>
    </div>
</nav>
<div class="container py-5 text-center text-white">
    <h3 class="mb-4">濮阳实时空气质量</h3>
    <div class="card p-4 text-dark d-inline-block">
        <h2>AQI指数：<span id="aqi">--</span></h2>
        <h4>空气质量等级：<span id="level">--</span></h4>
        <hr>
        <p>PM2.5：<span id="pm25">--</span></p>
        <p>PM10：<span id="pm10">--</span></p>
    </div>
</div>
<footer class="text-center text-white py-3 mt-5">
    <small>空气质量监测数据</small>
</footer>
<script>
const KEY = "ce986bb35e634271a49606ab2a226583";
async function getAir(){
    const res = await fetch(`https://devapi.qweather.com/v7/air/now?location=101180701&key=${KEY}`);
    const d = await res.json();
    const air = d.now;
    document.getElementById("aqi").innerText = air.aqi;
    document.getElementById("level").innerText = air.category;
    document.getElementById("pm25").innerText = air.pm2p5;
    document.getElementById("pm10").innerText = air.pm10;
}
window.onload = getAir;
</script>
</body>
</html>
