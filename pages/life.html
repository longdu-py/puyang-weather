<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濮阳生活出行指数</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/weather.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark nav-dark">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🌤️ 返回首页</a>
    </div>
</nav>
<div class="container py-4">
    <h3 class="text-center text-white mb-4">生活出行指数</h3>
    <div class="row g-3" id="lifeBox">
        <div class="col-12 text-white text-center">加载中</div>
    </div>
</div>
<footer class="text-center text-white py-3 mt-5">
    <small>穿衣、洗车、运动、防晒、感冒提示</small>
</footer>
<script>
const KEY = "ce986bb35e634271a49606ab2a226583";
async function loadLife(){
    const res = await fetch(`https://devapi.qweather.com/v7/indices/1d?location=101180701&key=${KEY}&type=1,2,3,5,6`);
    const d = await res.json();
    const wrap = document.getElementById("lifeBox");
    wrap.innerHTML = "";
    d.daily.forEach(item=>{
        wrap.innerHTML += `
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>${item.name}</h5>
                <p class="text-primary">${item.level}</p>
                <p>${item.category}</p>
                <small>${item.text}</small>
            </div>
        </div>`;
    })
}
window.onload = loadLife;
</script>
</body>
</html>
