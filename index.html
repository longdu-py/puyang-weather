<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濮阳天气预报 - 实时天气</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/weather.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark nav-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">🌤️ 濮阳天气预报</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="index.html">实时天气</a></li>
                <li class="nav-item"><a class="nav-link" href="pages/week.html">7天预报</a></li>
            </ul>
            <select id="citySelect" class="form-select w-auto">
                <option value="hualong">华龙区</option>
                <option value="puyangxian">濮阳县</option>
                <option value="qingfeng">清丰县</option>
                <option value="nanle">南乐县</option>
                <option value="fanxian">范县</option>
                <option value="taiqian">台前县</option>
            </select>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-5 text-center text-dark">
                <div class="weather-big mb-3" id="icon">🌤️</div>
                <div class="temp-num"><span id="temp">--</span>℃</div>
                <h4 class="mt-2" id="text">加载中</h4>
                <hr>
                <div class="row text-start mt-4">
                    <div class="col-6 mb-3">体感温度：<span id="feels">--</span>℃</div>
                    <div class="col-6 mb-3">湿度：<span id="humidity">--</span>%</div>
                    <div class="col-12">风向风速：<span id="wind">--</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-white py-3 mt-5">
    <small>濮阳天气预报开源站点 ©2026 | 天气数据：Open-Meteo 免费开源接口</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/weather.js"></script>
</body>
</html>
